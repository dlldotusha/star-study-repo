services:
  postgres:
    image: postgres:16
    container_name: star-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-star_study}
      POSTGRES_USER: ${POSTGRES_USER:-star_study}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - star-study-postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: star-study-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-star_study};Username=${POSTGRES_USER:-star_study};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      STAR_STUDY_ADMIN_LOGIN: ${STAR_STUDY_ADMIN_LOGIN:?Set STAR_STUDY_ADMIN_LOGIN in .env}
      STAR_STUDY_ADMIN_PASSWORD: ${STAR_STUDY_ADMIN_PASSWORD:?Set STAR_STUDY_ADMIN_PASSWORD in .env}
    ports:
      - "${STAR_STUDY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - star-study-keys:/app/DataProtectionKeys

volumes:
  star-study-postgres-data:
  star-study-keys:
